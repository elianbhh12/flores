<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Tania 💛</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>
  :root {
    --gold-light: #fff9e6;
    --gold-mid: #ffd95a;
    --gold-deep: #e8a000;
    --gold-accent: #ff8c00;
    --warm-brown: #5c3d11;
    --cream: #fffdf5;
    --petal-1: #ffe066;
    --petal-2: #ffb800;
    --petal-3: #fff3a3;
    --green: #4a7c3f;
    --green-light: #7db87a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    position: relative;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    background: radial-gradient(circle, #ffd95a, #ff8c00);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    box-shadow: 0 0 12px rgba(255, 200, 60, 0.7);
    mix-blend-mode: multiply;
  }

  /* Background sunburst */
  .sunburst {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 200vmax;
    height: 200vmax;
    transform: translate(-50%, -50%);
    background: conic-gradient(
      from 0deg,
      rgba(255, 249, 200, 0.45) 0deg 10deg,
      rgba(255, 255, 255, 0.0) 10deg 20deg,
      rgba(255, 249, 200, 0.45) 20deg 30deg,
      rgba(255, 255, 255, 0.0) 30deg 40deg,
      rgba(255, 249, 200, 0.45) 40deg 50deg,
      rgba(255, 255, 255, 0.0) 50deg 60deg,
      rgba(255, 249, 200, 0.45) 60deg 70deg,
      rgba(255, 255, 255, 0.0) 70deg 80deg,
      rgba(255, 249, 200, 0.45) 80deg 90deg,
      rgba(255, 255, 255, 0.0) 90deg 100deg,
      rgba(255, 249, 200, 0.45) 100deg 110deg,
      rgba(255, 255, 255, 0.0) 110deg 120deg,
      rgba(255, 249, 200, 0.45) 120deg 130deg,
      rgba(255, 255, 255, 0.0) 130deg 140deg,
      rgba(255, 249, 200, 0.45) 140deg 150deg,
      rgba(255, 255, 255, 0.0) 150deg 160deg,
      rgba(255, 249, 200, 0.45) 160deg 170deg,
      rgba(255, 255, 255, 0.0) 170deg 180deg,
      rgba(255, 249, 200, 0.45) 180deg 190deg,
      rgba(255, 255, 255, 0.0) 190deg 200deg,
      rgba(255, 249, 200, 0.45) 200deg 210deg,
      rgba(255, 255, 255, 0.0) 210deg 220deg,
      rgba(255, 249, 200, 0.45) 220deg 230deg,
      rgba(255, 255, 255, 0.0) 230deg 240deg,
      rgba(255, 249, 200, 0.45) 240deg 250deg,
      rgba(255, 255, 255, 0.0) 250deg 260deg,
      rgba(255, 249, 200, 0.45) 260deg 270deg,
      rgba(255, 255, 255, 0.0) 270deg 280deg,
      rgba(255, 249, 200, 0.45) 280deg 290deg,
      rgba(255, 255, 255, 0.0) 290deg 300deg,
      rgba(255, 249, 200, 0.45) 300deg 310deg,
      rgba(255, 255, 255, 0.0) 310deg 320deg,
      rgba(255, 249, 200, 0.45) 320deg 330deg,
      rgba(255, 255, 255, 0.0) 330deg 340deg,
      rgba(255, 249, 200, 0.45) 340deg 350deg,
      rgba(255, 255, 255, 0.0) 350deg 360deg
    );
    animation: rotateSun 60s linear infinite;
    z-index: 0;
  }

  @keyframes rotateSun { to { transform: translate(-50%, -50%) rotate(360deg); } }

  /* Radial glow center */
  .glow-center {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 600px;
    height: 600px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255, 235, 100, 0.35) 0%, transparent 70%);
    animation: breathe 5s ease-in-out infinite;
    z-index: 1;
    pointer-events: none;
  }
  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  /* Canvas for falling petals */
  #petalCanvas {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  /* Main card */
  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .card {
    width: min(520px, 92vw);
    background: rgba(255, 253, 245, 0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255, 200, 60, 0.45);
    border-radius: 4px;
    padding: 60px 52px 50px;
    text-align: center;
    box-shadow:
      0 2px 4px rgba(180, 120, 0, 0.06),
      0 8px 32px rgba(180, 120, 0, 0.12),
      0 24px 80px rgba(180, 120, 0, 0.1),
      inset 0 0 80px rgba(255, 240, 160, 0.25);
    position: relative;
    animation: cardReveal 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
    transform: translateY(30px) scale(0.96);
  }

  @keyframes cardReveal {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Corner flourishes */
  .card::before, .card::after {
    content: '✦';
    position: absolute;
    font-size: 18px;
    color: var(--gold-mid);
    opacity: 0.8;
  }
  .card::before { top: 16px; left: 22px; }
  .card::after { bottom: 16px; right: 22px; }

  .corner-br { position: absolute; top: 16px; right: 22px; font-size: 18px; color: var(--gold-mid); opacity: 0.8; }
  .corner-tl { position: absolute; bottom: 16px; left: 22px; font-size: 18px; color: var(--gold-mid); opacity: 0.8; }

  /* Thin decorative top line */
  .top-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.6s;
  }
  .line-deco {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-deep), transparent);
    max-width: 90px;
  }
  .top-ornament span { font-size: 20px; color: var(--gold-deep); }

  /* Date badge */
  .date-badge {
    display: inline-block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-accent);
    border: 1px solid rgba(232, 160, 0, 0.35);
    padding: 5px 18px;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 0.9s;
  }

  /* Big name */
  .main-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.2rem, 10vw, 5rem);
    font-weight: 700;
    color: var(--warm-brown);
    line-height: 1;
    margin-bottom: 6px;
    opacity: 0;
    animation: nameReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards 1.1s;
    background: linear-gradient(135deg, #7a4a05 0%, #c87800 45%, #7a4a05 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  @keyframes nameReveal {
    from { opacity: 0; transform: translateY(16px) scale(0.92); letter-spacing: 0.3em; }
    to { opacity: 1; transform: translateY(0) scale(1); letter-spacing: normal; }
  }

  /* Italic subtitle */
  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--gold-deep);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 1.5s;
  }

  /* Divider flower */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 auto 32px;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 1.7s;
    max-width: 320px;
  }
  .divider hr {
    flex: 1;
    border: none;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(232,160,0,0.5), transparent);
  }
  .divider-flower { font-size: 22px; line-height: 1; }

  /* Message area */
  .message-wrap {
    min-height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 36px;
  }

  #mensaje {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-style: italic;
    color: #6b4400;
    line-height: 1.7;
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 1.9s;
    padding: 0 8px;
    position: relative;
  }
  #mensaje.nuevo {
    animation: messageSwap 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  @keyframes messageSwap {
    0% { opacity: 0; transform: scale(0.85) translateY(12px); }
    60% { transform: scale(1.04) translateY(-3px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Button */
  .btn-wrap {
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 2.2s;
  }

  button {
    background: linear-gradient(135deg, var(--gold-mid) 0%, var(--gold-accent) 100%);
    color: white;
    border: none;
    padding: 16px 44px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: none;
    border-radius: 2px;
    box-shadow: 0 4px 24px rgba(232, 160, 0, 0.45);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  button:hover::before { transform: translateX(100%); }
  button:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 8px 36px rgba(232, 160, 0, 0.6);
  }
  button:active { transform: translateY(-1px) scale(1.02); }

  /* Bottom tagline */
  .tagline {
    margin-top: 28px;
    font-size: 0.78rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(150, 100, 20, 0.45);
    opacity: 0;
    animation: fadeUp 0.9s ease forwards 2.5s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Floating large sunflower SVG decoration */
  .flower-deco {
    position: fixed;
    pointer-events: none;
    z-index: 3;
    opacity: 0.13;
    animation: drifting 20s ease-in-out infinite;
  }
  .flower-deco.tl { top: -60px; left: -60px; width: 300px; animation-delay: 0s; }
  .flower-deco.br { bottom: -60px; right: -60px; width: 280px; animation-delay: -10s; }
  .flower-deco.tr { top: 20px; right: 20px; width: 160px; opacity: 0.09; animation-delay: -5s; }
  .flower-deco.bl { bottom: 30px; left: 30px; width: 160px; opacity: 0.09; animation-delay: -15s; }

  @keyframes drifting {
    0%, 100% { transform: rotate(-8deg) scale(1); }
    50% { transform: rotate(5deg) scale(1.06); }
  }

  /* Burst overlay on click */
  .burst {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 100;
    animation: burstAnim 0.6s ease-out forwards;
    background: radial-gradient(circle, rgba(255,217,90,0.7), transparent 70%);
  }
  @keyframes burstAnim {
    from { transform: translate(-50%,-50%) scale(0); opacity: 1; }
    to { transform: translate(-50%,-50%) scale(8); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Background layers -->
<div class="sunburst"></div>
<div class="glow-center"></div>
<canvas id="petalCanvas"></canvas>

<!-- Decorative large flowers -->
<svg class="flower-deco tl" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100,100)">
    <ellipse cx="0" cy="-62" rx="18" ry="34" fill="#ffd95a" transform="rotate(0)"/>

    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffb800" transform="rotate(72)"/>
    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffd95a" transform="rotate(108)"/>
    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffb800" transform="rotate(144)"/>
    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffd95a" transform="rotate(180)"/>
    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffb800" transform="rotate(216)"/>
    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffd95a" transform="rotate(252)"/>
    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffb800" transform="rotate(288)"/>
    <ellipse cx="0" cy="-58" rx="16" ry="30" fill="#ffd95a" transform="rotate(324)"/>
    <circle cx="0" cy="0" r="26" fill="#7a4500"/>

  </g>

<svg class="flower-deco tr" viewBox="0 0 200 200" fill="none"><g transform="translate(100,100)"><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(0)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(45)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(90)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(135)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(180)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(225)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(270)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffe066" transform="rotate(315)"/><circle cx="0" cy="0" r="24" fill="#6b3800"/></g></svg>
<svg class="flower-deco bl" viewBox="0 0 200 200" fill="none"><g transform="translate(100,100)"><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(0)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(45)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(90)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(135)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(180)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(225)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(270)"/><ellipse cx="0" cy="-55" rx="15" ry="28" fill="#ffb800" transform="rotate(315)"/><circle cx="0" cy="0" r="24" fill="#5c3000"/></g></svg>

<!-- Main content -->
<div class="scene">
  <div class="card">
    <span class="corner-br">✦</span>
    <span class="corner-tl">✦</span>

    <div class="top-ornament">
      <div class="line-deco"></div>
      <span>🌻</span>
      <div class="line-deco"></div>
    </div>

    <div class="date-badge">Feliz Día de las Flores Amarillas</div>

    <h1 class="main-name">Tania</h1>
    <p class="subtitle">para ti, con todo mi amor</p>

    <div class="divider">
      <hr>
      <span class="divider-flower">🌼</span>
      <hr>
    </div>

    <div class="message-wrap">
      <p id="mensaje">Siempre recuerda que eres mi brillito 💛</p>
    </div>

    <div class="btn-wrap">
      <button id="mainBtn" onclick="siguienteMensaje()">Leer otro mensaje</button>
    </div>

    <p class="tagline">con amor · siempre · para siempre</p>
  </div>
</div>

<!-- Cursor -->
<div class="cursor" id="cursor"></div>

<script>
// ── Custom cursor ──────────────────────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%,-50%) scale(1.8)');
document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%,-50%) scale(1)');

// ── Messages ───────────────────────────────────────────────────
const mensajes = [
  "Siempre recuerda que eres mi brillito 💛",
  "Eres el amor de mi vida mi mujercita 🌼",
  "No hay dia y noche que piense en esos ojitos hermosos ☀️",
  "Te amo mucho mi mollita hermosa🌻",
  "Hoy te amo mas que ayer pero menos que mañana ❤️🌸",
  "Tu y yo somos como Wisin y Yandel - El duo dinamico 🌼💛",
  "Tu eres la soporte que todo adc desaria tener 🌟",

  "Eres mi favorita. Mi persona favorita. Para siempre. 🌼❤️"
];

let index = 0;

function siguienteMensaje() {
  index = (index + 1) % mensajes.length;
  const el = document.getElementById('mensaje');
  el.classList.remove('nuevo');
  void el.offsetWidth;
  el.textContent = mensajes[index];
  el.classList.add('nuevo');

  // Burst at button
  const btn = document.getElementById('mainBtn');
  const rect = btn.getBoundingClientRect();
  crearBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);

  // Shower of petals
  for (let i = 0; i < 30; i++) setTimeout(spawnPetal, i * 40);
}

// ── Burst ──────────────────────────────────────────────────────
function crearBurst(x, y) {
  const b = document.createElement('div');
  b.className = 'burst';
  b.style.left = x + 'px';
  b.style.top = y + 'px';
  b.style.width = '80px';
  b.style.height = '80px';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 700);
}

// ── Canvas petal rain ──────────────────────────────────────────
const canvas = document.getElementById('petalCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const petals = [];
const PETAL_COLORS = ['#ffd95a','#ffb800','#ffe066','#fff3a3','#ff8c00','#ffca28'];

class Petal {
  constructor(burst = false) {
    this.reset(burst);
  }
  reset(burst = false) {
    this.x = burst ? canvas.width / 2 + (Math.random() - 0.5) * 200 : Math.random() * canvas.width;
    this.y = burst ? canvas.height / 2 : -20;
    this.size = 6 + Math.random() * 12;
    this.speedY = burst ? -2 - Math.random() * 4 : 1 + Math.random() * 2.5;
    this.speedX = (Math.random() - 0.5) * 2.5;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.08;
    this.color = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
    this.alpha = 0.85 + Math.random() * 0.15;
    this.gravity = burst ? 0.08 : 0;
    this.life = 1;
    this.decay = burst ? 0.012 : 0.003;
  }
  update() {
    this.x += this.speedX + Math.sin(this.y * 0.01) * 0.6;
    this.y += this.speedY;
    this.speedY += this.gravity;
    this.rot += this.rotSpeed;
    this.life -= this.decay;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha * this.life;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size * 0.5, this.size, 0, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
  isDead() { return this.life <= 0 || this.y > canvas.height + 30; }
}

function spawnPetal(burst = false) {
  petals.push(new Petal(burst));
}

// Continuous gentle rain
setInterval(() => { if (petals.length < 60) spawnPetal(); }, 300);

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = petals.length - 1; i >= 0; i--) {
    petals[i].update();
    petals[i].draw();
    if (petals[i].isDead()) petals.splice(i, 1);
  }
  requestAnimationFrame(loop);
}
loop();

// ── Click burst anywhere ───────────────────────────────────────
